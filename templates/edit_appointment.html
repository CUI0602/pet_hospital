<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>зЉЦиЊСйҐДзЇ¶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel='stylesheet' href='{{ url_for(''static'', filename=''style.css'') }}'>

</head>
<body>
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0">зЉЦиЊСйҐДзЇ¶</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">еЃ†зЙ©</label>
                        <select name="pet_id" class="form-select" required>
                            {% for pet in pets %}
                            <option value="{{ pet.id }}" {% if pet.id == appointment.pet_id %}selected{% endif %}>{{ pet.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">еЕљеМї</label>
                        <select name="vet_id" class="form-select" required>
                            {% for vet in veterinarians %}
                            <option value="{{ vet.id }}" {% if vet.id == appointment.vet_id %}selected{% endif %}>{{ vet.name }} - {{ vet.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">жЬНеК°з±їеЮЛ</label>
                        <select name="service_type" class="form-select">
                            <option value="">иѓЈйАЙжЛ©</option>
                            <option value="зЦЂиЛЧжО•зІН" {% if appointment.service_type == 'зЦЂиЛЧжО•зІН' %}selected{% endif %}>зЦЂиЛЧжО•зІН</option>
                            <option value="дљУж£А" {% if appointment.service_type == 'дљУж£А' %}selected{% endif %}>дљУж£А</option>
                            <option value="еЖЕзІСж£АжЯ? {% if appointment.service_type == 'еЖЕзІСж£АжЯ? %}selected{% endif %}>еЖЕзІСж£АжЯ?/option>
                            <option value="е§ЦзІСжЙЛжЬѓ" {% if appointment.service_type == 'е§ЦзІСжЙЛжЬѓ' %}selected{% endif %}>е§ЦзІСжЙЛжЬѓ</option>
                            <option value="зЊОеЃєжіЧжЊ°" {% if appointment.service_type == 'зЊОеЃєжіЧжЊ°' %}selected{% endif %}>зЊОеЃєжіЧжЊ°</option>
                            <option value="еѓДеЕї" {% if appointment.service_type == 'еѓДеЕї' %}selected{% endif %}>еѓДеЕї</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">йҐДзЇ¶жЧґйЧі</label>
                        <div class="d-flex align-items-center gap-1">
                            <select name="year" class="form-select" style="width:auto;" required>
                                {% for y in range(2020, 2031) %}
                                <option value="{{ y }}" {% if y == appointment.appointment_time.year %}selected{% endif %}>{{ y }}</option>
                                {% endfor %}
                            </select>
                            <span>еє?/span>
                            <select name="month" class="form-select" style="width:auto;" required>
                                {% for m in range(1, 13) %}
                                <option value="{{ '%02d' % m }}" {% if '%02d' % m == appointment.appointment_time.strftime('%m') %}selected{% endif %}>{{ '%02d' % m }}</option>
                                {% endfor %}
                            </select>
                            <span>жЬ?/span>
                            <select name="day" class="form-select" style="width:auto;" required>
                                {% for d in range(1, 32) %}
                                <option value="{{ '%02d' % d }}" {% if '%02d' % d == appointment.appointment_time.strftime('%d') %}selected{% endif %}>{{ '%02d' % d }}</option>
                                {% endfor %}
                            </select>
                            <span>жЧ?/span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">е∞±иѓКеОЯеЫ†</label>
                        <textarea name="reason" class="form-control" rows="3">{{ appointment.reason }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">зКґжА?/label>
                        <select name="status" class="form-select">
                            <option value="pending" {% if appointment.status == 'pending' %}selected{% endif %}>еЊЕе∞±иѓ?/option>
                            <option value="completed" {% if appointment.status == 'completed' %}selected{% endif %}>еЈ≤еЃМжИ?/option>
                            <option value="cancelled" {% if appointment.status == 'cancelled' %}selected{% endif %}>еЈ≤еПЦжґ?/option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">жЫіжЦ∞</button>
                    <a href="/appointments" class="btn btn-secondary w-100 mt-2">еПЦжґИ</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
