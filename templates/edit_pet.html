<!DOCTYPE html>
<html lang="zh">
<head>

    <link rel='stylesheet' href='{{ url_for(''static'', filename=''style.css'') }}'>

</head>
<body>
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">зј–иҫ‘е® зү©</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/pets/edit/{{ pet.id }}">
                    <div class="mb-3">
                        <label class="form-label">еҗҚеӯ—</label>
                        <input type="text" name="name" class="form-control" value="{{ pet.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">з§Қзұ»</label>
                        <input type="text" name="species" class="form-control" value="{{ pet.species }}" required placeholder="еҰӮпјҡзӢ—гҖҒзҢ«гҖҒе…”">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">жҖ§еҲ«</label>
                        <select name="gender" class="form-select">
                            <option value="">иҜ·йҖүжӢ©</option>
                            <option value="е…? {% if pet.gender == 'е…? %}selected{% endif %}>е…?/option>
                            <option value="жҜ? {% if pet.gender == 'жҜ? %}selected{% endif %}>жҜ?/option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">дҪ“йҮҚ (kg)</label>
                        <input type="number" name="weight" class="form-control" step="0.1" value="{{ pet.weight }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">иҝҮж•ҸеҸ?/label>
                        <textarea name="allergies" class="form-control" rows="2" placeholder="еҰӮпјҡйқ’йңүзҙ иҝҮж•?>{{ pet.allergies }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">е№ҙйҫ„</label>
                        <input type="number" name="age" class="form-control" value="{{ pet.age }}" required>
                    </div>
                    <!-- дё»дәә -->
                    <div class="mb-3">
                        <label class="form-label">дё»дәә</label>
                        <select name="owner_id" class="form-select" required>
                            {% for owner in owners %}
                                <!-- 
                                еҲӨж–ӯйҖ»иҫ‘пјҡеҰӮжһңиҝҷдё?owner зҡ?id зӯүдәҺ pet еҪ“еүҚзҡ?owner_idпј?
                                е°ұеҠ дё?selected еұһжҖ§пјҲиЎЁзӨәиў«йҖүдёӯпј?
                                -->
                                <option value="{{ owner.id }}" {% if owner.id == pet.owner_id %}selected{% endif %}>
                                    {{ owner.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">дҝқеӯҳдҝ®ж”№</button>
                    <a href="/pets" class="btn btn-secondary w-100 mt-2">еҸ–ж¶Ҳ</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
