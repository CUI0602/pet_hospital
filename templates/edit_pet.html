<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>编辑宠物</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">编辑宠物</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/pets/edit/{{ pet.id }}">
                    <div class="mb-3">
                        <label class="form-label">名字</label>
                        <input type="text" name="name" class="form-control" value="{{ pet.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">种类</label>
                        <input type="text" name="species" class="form-control" value="{{ pet.species }}" required placeholder="如：狗、猫、兔">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">性别</label>
                        <select name="gender" class="form-select">
                            <option value="">请选择</option>
                            <option value="公" {% if pet.gender == '公' %}selected{% endif %}>公</option>
                            <option value="母" {% if pet.gender == '母' %}selected{% endif %}>母</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">体重 (kg)</label>
                        <input type="number" name="weight" class="form-control" step="0.1" value="{{ pet.weight }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">过敏史</label>
                        <textarea name="allergies" class="form-control" rows="2" placeholder="如：青霉素过敏">{{ pet.allergies }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">年龄</label>
                        <input type="number" name="age" class="form-control" value="{{ pet.age }}" required>
                    </div>
                    <!-- 主人 -->
                    <div class="mb-3">
                        <label class="form-label">主人</label>
                        <select name="owner_id" class="form-select" required>
                            {% for owner in owners %}
                                <!-- 
                                判断逻辑：如果这个 owner 的 id 等于 pet 当前的 owner_id，
                                就加上 selected 属性（表示被选中）
                                -->
                                <option value="{{ owner.id }}" {% if owner.id == pet.owner_id %}selected{% endif %}>
                                    {{ owner.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">保存修改</button>
                    <a href="/pets" class="btn btn-secondary w-100 mt-2">取消</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
