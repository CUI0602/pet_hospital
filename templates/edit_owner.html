
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>编辑主人</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">编辑主人信息</h4>
            </div>
            <div class="card-body">
                <!-- 表单提交地址是 /owners/edit/ID -->
                <form method="POST" action="/owners/edit/{{ owner.id }}">
                    
                    <!-- 注意这里的 value="{{ owner.name }}" 这就是显示旧数据的关键 -->
                    <div class="mb-3">
                        <label class="form-label">姓名</label>
                        <input type="text" name="name" class="form-control" value="{{ owner.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">电话</label>
                        <input type="text" name="phone" class="form-control" value="{{ owner.phone }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">地址</label>
                        <input type="text" name="address" class="form-control" value="{{ owner.address }}">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">保存修改</button>
                    <a href="/owners" class="btn btn-secondary w-100 mt-2">取消</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
