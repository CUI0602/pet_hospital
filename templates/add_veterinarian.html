<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>新增兽医</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">新增兽医</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">姓名</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">职称</label>
                        <input type="text" name="title" class="form-control" placeholder="如：主任医师、主治医师">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">电话</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">专长</label>
                        <input type="text" name="specialty" class="form-control" placeholder="如：外科、内科、骨科">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">年龄</label>
                        <input type="number" name="age" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-success w-100">保存</button>
                    <a href="/veterinarians" class="btn btn-secondary w-100 mt-2">取消</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
