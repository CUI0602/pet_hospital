<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>宠物医院管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% include '_navbar.html' %}
    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h2 class="text-primary">欢迎使用宠物医院管理系统</h2>
                <p class="text-muted">选择以下模块进行管理</p>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-md-3">
                <a href="/owners" class="text-decoration-none">
                    <div class="card text-center shadow-sm h-100">
                        <div class="card-body">
                            <h1>👤</h1>
                            <h5>主人管理</h5>
                            <p class="text-muted small">管理宠物主人信息</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/pets" class="text-decoration-none">
                    <div class="card text-center shadow-sm h-100">
                        <div class="card-body">
                            <h1>🐾</h1>
                            <h5>宠物管理</h5>
                            <p class="text-muted small">管理宠物信息</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/veterinarians" class="text-decoration-none">
                    <div class="card text-center shadow-sm h-100">
                        <div class="card-body">
                            <h1>👨‍⚕️</h1>
                            <h5>兽医管理</h5>
                            <p class="text-muted small">管理兽医信息</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/appointments" class="text-decoration-none">
                    <div class="card text-center shadow-sm h-100">
                        <div class="card-body">
                            <h1>📅</h1>
                            <h5>预约管理</h5>
                            <p class="text-muted small">管理预约信息</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/medical_records" class="text-decoration-none">
                    <div class="card text-center shadow-sm h-100">
                        <div class="card-body">
                            <h1>📋</h1>
                            <h5>病历管理</h5>
                            <p class="text-muted small">管理病历信息</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/medicines" class="text-decoration-none">
                    <div class="card text-center shadow-sm h-100">
                        <div class="card-body">
                            <h1>💊</h1>
                            <h5>药品管理</h5>
                            <p class="text-muted small">管理药品信息</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/bills" class="text-decoration-none">
                    <div class="card text-center shadow-sm h-100">
                        <div class="card-body">
                            <h1>💰</h1>
                            <h5>账单管理</h5>
                            <p class="text-muted small">管理账单信息</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
