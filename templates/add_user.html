<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>新增用户</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow">
        <div class="card-header bg-success text-white"><h4 class="mb-0">新增用户</h4></div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">角色</label>
                    <select name="role" class="form-select">
                        <option value="admin">管理员</option>
                        <option value="doctor">医生</option>
                        <option value="pharmacist">药房</option>
                        <option value="receptionist" selected>前台</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100">保存</button>
                <a href="/users" class="btn btn-secondary w-100 mt-2">取消</a>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
