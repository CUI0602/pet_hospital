<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>зј–иҫ‘з—…еҺҶ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel='stylesheet' href='{{ url_for(''static'', filename=''style.css'') }}'>

</head>
<body>
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0">зј–иҫ‘з—…еҺҶ</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="version" value="{{ record.version }}">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label">е® зү©</label>
                        <select id="pet-select" name="pet_id" class="form-select" required>
                            {% for pet in pets %}
                            <option value="{{ pet.id }}" {% if pet.id == record.pet_id %}selected{% endif %} data-allergies="{{ pet.allergies or '' }}">{{ pet.name }}</option>
                            {% endfor %}
                        </select>
                        <div id="allergy-warning" class="mt-2" style="display:none;">
                            <div class="alert alert-danger py-2 mb-0">вҡ?<span id="allergy-text"></span></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">е…ҪеҢ»</label>
                        <select name="vet_id" class="form-select">
                            <option value="">иҜ·йҖүжӢ©е…ҪеҢ»</option>
                            {% for vet in veterinarians %}
                            <option value="{{ vet.id }}" {% if vet.id == record.vet_id %}selected{% endif %}>{{ vet.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">е…іиҒ”йў„зәҰ</label>
                        <select name="appointment_id" class="form-select">
                            <option value="">ж—?/option>
                            {% for a in appointments %}
                            <option value="{{ a.id }}" {% if a.id == record.appointment_id %}selected{% endif %}>{{ a.pet.name }} - {{ a.appointment_time.strftime('%Yе№?mжң?dж—?) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">иҜҠж–ӯ</label>
                        <textarea name="diagnosis" class="form-control" rows="3" required>{{ record.diagnosis }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">жІ»з–—</label>
                        <textarea name="treatment" class="form-control" rows="3">{{ record.treatment }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">жҢӮеҸ·иҙ?/label>
                                <input type="number" name="registration_fee" class="form-control" step="0.01" value="{{ record.registration_fee }}">
                            </div>
                        </div>
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">иҜҠз–—иҙ?/label>
                                <input type="number" name="treatment_fee" class="form-control" step="0.01" value="{{ record.treatment_fee }}">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ж—Ҙжңҹ</label>
                        <div class="d-flex align-items-center gap-1">
                            <select name="year" class="form-select" style="width:auto;" required>
                                {% for y in range(2020, 2031) %}
                                <option value="{{ y }}" {% if y == record.record_date.year %}selected{% endif %}>{{ y }}</option>
                                {% endfor %}
                            </select>
                            <span>е№?/span>
                            <select name="month" class="form-select" style="width:auto;" required>
                                {% for m in range(1, 13) %}
                                <option value="{{ '%02d' % m }}" {% if '%02d' % m == record.record_date.strftime('%m') %}selected{% endif %}>{{ '%02d' % m }}</option>
                                {% endfor %}
                            </select>
                            <span>жң?/span>
                            <select name="day" class="form-select" style="width:auto;" required>
                                {% for d in range(1, 32) %}
                                <option value="{{ '%02d' % d }}" {% if '%02d' % d == record.record_date.strftime('%d') %}selected{% endif %}>{{ '%02d' % d }}</option>
                                {% endfor %}
                            </select>
                            <span>ж—?/span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">з”ЁиҚҜжҳҺз»Ҷ</label>
                        <div id="medicine-list">
                            {% for pm in record.medicines %}
                            <div class="d-flex gap-2 mb-2">
                                <select name="medicine_ids[]" class="form-select" style="width:auto;">
                                    <option value="">йҖүжӢ©иҚҜе“Ғ</option>
                                    {% for m in medicines %}
                                    <option value="{{ m.id }}" {% if m.id == pm.medicine_id %}selected{% endif %}>{{ m.medicine_name }} (еә“еӯҳ: {{ m.stock_quantity }})</option>
                                    {% endfor %}
                                </select>
                                <input type="number" name="quantities[]" class="form-control" style="width:80px;" placeholder="ж•°йҮҸ" value="{{ pm.quantity }}" min="1">
                                <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()">-</button>
                            </div>
                            {% endfor %}
                            <div class="d-flex gap-2 mb-2">
                                <select name="medicine_ids[]" class="form-select" style="width:auto;">
                                    <option value="">йҖүжӢ©иҚҜе“Ғ</option>
                                    {% for m in medicines %}
                                    <option value="{{ m.id }}">{{ m.medicine_name }} (еә“еӯҳ: {{ m.stock_quantity }})</option>
                                    {% endfor %}
                                </select>
                                <input type="number" name="quantities[]" class="form-control" style="width:80px;" placeholder="ж•°йҮҸ" value="1" min="1">
                                <button type="button" class="btn btn-outline-success btn-sm" onclick="addMedicineRow()">+</button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">жӣҙж–°</button>
                    <a href="/medical_records" class="btn btn-secondary w-100 mt-2">еҸ–ж¶Ҳ</a>
                </form>
            </div>
        </div>
    </div>
<script>
function addMedicineRow() {
    const div = document.createElement('div');
    div.className = 'd-flex gap-2 mb-2';
    const template = document.querySelector('#medicine-list .d-flex:last-child').cloneNode(true);
    template.querySelectorAll('select, input').forEach(el => el.value = '');
    template.querySelector('input[name="quantities[]"]').value = '1';
    const btn = template.querySelector('button');
    btn.className = 'btn btn-outline-danger btn-sm';
    btn.textContent = '-';
    btn.onclick = function(){ this.parentElement.remove(); };
    document.getElementById('medicine-list').appendChild(template);
}

document.getElementById('pet-select').addEventListener('change', checkAllergy);
checkAllergy();
function checkAllergy() {
    const sel = document.getElementById('pet-select');
    const opt = sel.options[sel.selectedIndex];
    const allergies = opt ? opt.dataset.allergies : '';
    const warning = document.getElementById('allergy-warning');
    if (allergies) {
        document.getElementById('allergy-text').textContent = 'иҜҘе® зү©жңүиҝҮж•ҸеҸІпјҡ' + allergies;
        warning.style.display = 'block';
    } else {
        warning.style.display = 'none';
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
