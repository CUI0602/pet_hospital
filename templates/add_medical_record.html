<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>新增病历</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">新增病历</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">宠物</label>
                        <select id="pet-select" name="pet_id" class="form-select" required>
                            <option value="">请选择宠物</option>
                            {% for pet in pets %}
                            <option value="{{ pet.id }}" data-allergies="{{ pet.allergies or '' }}">{{ pet.name }}</option>
                            {% endfor %}
                        </select>
                        <div id="allergy-warning" class="mt-2" style="display:none;">
                            <div class="alert alert-danger py-2 mb-0">⚠ <span id="allergy-text"></span></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">兽医</label>
                        <select name="vet_id" class="form-select">
                            <option value="">请选择兽医</option>
                            {% for vet in veterinarians %}
                            <option value="{{ vet.id }}">{{ vet.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">关联预约</label>
                        <select name="appointment_id" class="form-select">
                            <option value="">无</option>
                            {% for a in appointments %}
                            <option value="{{ a.id }}">{{ a.pet.name }} - {{ a.appointment_time.strftime('%Y年%m月%d日') }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">诊断</label>
                        <textarea name="diagnosis" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">治疗</label>
                        <textarea name="treatment" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">挂号费</label>
                                <input type="number" name="registration_fee" class="form-control" step="0.01" value="0">
                            </div>
                        </div>
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">诊疗费</label>
                                <input type="number" name="treatment_fee" class="form-control" step="0.01" value="0">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">日期</label>
                        <div class="d-flex align-items-center gap-1">
                            <select name="year" class="form-select" style="width:auto;" required>
                                <option value="">年</option>
                                {% for y in range(2020, 2031) %}
                                <option value="{{ y }}">{{ y }}</option>
                                {% endfor %}
                            </select>
                            <span>年</span>
                            <select name="month" class="form-select" style="width:auto;" required>
                                <option value="">月</option>
                                {% for m in range(1, 13) %}
                                <option value="{{ '%02d' % m }}">{{ '%02d' % m }}</option>
                                {% endfor %}
                            </select>
                            <span>月</span>
                            <select name="day" class="form-select" style="width:auto;" required>
                                <option value="">日</option>
                                {% for d in range(1, 32) %}
                                <option value="{{ '%02d' % d }}">{{ '%02d' % d }}</option>
                                {% endfor %}
                            </select>
                            <span>日</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">用药明细</label>
                        <div id="medicine-list">
                            <div class="d-flex gap-2 mb-2">
                                <select name="medicine_ids[]" class="form-select" style="width:auto;">
                                    <option value="">选择药品</option>
                                    {% for m in medicines %}
                                    <option value="{{ m.id }}">{{ m.medicine_name }} (库存: {{ m.stock_quantity }})</option>
                                    {% endfor %}
                                </select>
                                <input type="number" name="quantities[]" class="form-control" style="width:80px;" placeholder="数量" value="1" min="1">
                                <button type="button" class="btn btn-outline-success btn-sm" onclick="addMedicineRow()">+</button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">保存</button>
                    <a href="/medical_records" class="btn btn-secondary w-100 mt-2">取消</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('pet-select').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    const allergies = opt ? opt.dataset.allergies : '';
    const warning = document.getElementById('allergy-warning');
    if (allergies) {
        document.getElementById('allergy-text').textContent = '该宠物有过敏史：' + allergies;
        warning.style.display = 'block';
    } else {
        warning.style.display = 'none';
    }
});
function addMedicineRow() {
    const div = document.createElement('div');
    div.className = 'd-flex gap-2 mb-2';
    div.innerHTML = document.querySelector('#medicine-list .d-flex').innerHTML.replace(/\+$/, '<button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()">-</button>');
    div.querySelector('button:last-child').onclick = function(){ this.parentElement.remove(); };
    document.getElementById('medicine-list').appendChild(div);
}
</script>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
