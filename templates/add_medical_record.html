<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ж–°еўһз—…еҺҶ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel='stylesheet' href='{{ url_for(''static'', filename=''style.css'') }}'>

</head>
<body>
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">ж–°еўһз—…еҺҶ</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">е® зү©</label>
                        <select id="pet-select" name="pet_id" class="form-select" required>
                            <option value="">иҜ·йҖүжӢ©е® зү©</option>
                            {% for pet in pets %}
                            <option value="{{ pet.id }}" data-allergies="{{ pet.allergies or '' }}">{{ pet.name }}</option>
                            {% endfor %}
                        </select>
                        <div id="allergy-warning" class="mt-2" style="display:none;">
                            <div class="alert alert-danger py-2 mb-0">вҡ?<span id="allergy-text"></span></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">е…ҪеҢ»</label>
                        <select name="vet_id" class="form-select">
                            <option value="">иҜ·йҖүжӢ©е…ҪеҢ»</option>
                            {% for vet in veterinarians %}
                            <option value="{{ vet.id }}">{{ vet.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">е…іиҒ”йў„зәҰ</label>
                        <select name="appointment_id" class="form-select">
                            <option value="">ж—?/option>
                            {% for a in appointments %}
                            <option value="{{ a.id }}">{{ a.pet.name }} - {{ a.appointment_time.strftime('%Yе№?mжң?dж—?) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">иҜҠж–ӯ</label>
                        <textarea name="diagnosis" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">жІ»з–—</label>
                        <textarea name="treatment" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">жҢӮеҸ·иҙ?/label>
                                <input type="number" name="registration_fee" class="form-control" step="0.01" value="0">
                            </div>
                        </div>
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">иҜҠз–—иҙ?/label>
                                <input type="number" name="treatment_fee" class="form-control" step="0.01" value="0">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ж—Ҙжңҹ</label>
                        <div class="d-flex align-items-center gap-1">
                            <select name="year" class="form-select" style="width:auto;" required>
                                <option value="">е№?/option>
                                {% for y in range(2020, 2031) %}
                                <option value="{{ y }}">{{ y }}</option>
                                {% endfor %}
                            </select>
                            <span>е№?/span>
                            <select name="month" class="form-select" style="width:auto;" required>
                                <option value="">жң?/option>
                                {% for m in range(1, 13) %}
                                <option value="{{ '%02d' % m }}">{{ '%02d' % m }}</option>
                                {% endfor %}
                            </select>
                            <span>жң?/span>
                            <select name="day" class="form-select" style="width:auto;" required>
                                <option value="">ж—?/option>
                                {% for d in range(1, 32) %}
                                <option value="{{ '%02d' % d }}">{{ '%02d' % d }}</option>
                                {% endfor %}
                            </select>
                            <span>ж—?/span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">з”ЁиҚҜжҳҺз»Ҷ</label>
                        <div id="medicine-list">
                            <div class="d-flex gap-2 mb-2">
                                <select name="medicine_ids[]" class="form-select" style="width:auto;">
                                    <option value="">йҖүжӢ©иҚҜе“Ғ</option>
                                    {% for m in medicines %}
                                    <option value="{{ m.id }}">{{ m.medicine_name }} (еә“еӯҳ: {{ m.stock_quantity }})</option>
                                    {% endfor %}
                                </select>
                                <input type="number" name="quantities[]" class="form-control" style="width:80px;" placeholder="ж•°йҮҸ" value="1" min="1">
                                <button type="button" class="btn btn-outline-success btn-sm" onclick="addMedicineRow()">+</button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">дҝқеӯҳ</button>
                    <a href="/medical_records" class="btn btn-secondary w-100 mt-2">еҸ–ж¶Ҳ</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('pet-select').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    const allergies = opt ? opt.dataset.allergies : '';
    const warning = document.getElementById('allergy-warning');
    if (allergies) {
        document.getElementById('allergy-text').textContent = 'иҜҘе® зү©жңүиҝҮж•ҸеҸІпјҡ' + allergies;
        warning.style.display = 'block';
    } else {
        warning.style.display = 'none';
    }
});
function addMedicineRow() {
    const div = document.createElement('div');
    div.className = 'd-flex gap-2 mb-2';
    div.innerHTML = document.querySelector('#medicine-list .d-flex').innerHTML.replace(/\+$/, '<button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()">-</button>');
    div.querySelector('button:last-child').onclick = function(){ this.parentElement.remove(); };
    document.getElementById('medicine-list').appendChild(div);
}
</script>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
