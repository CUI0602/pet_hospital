<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>宠物医院管理系统</title>
    <!-- 引入 Bootstrap 样式库 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5">
        <!-- 标题栏 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary"><i class="bi bi-hospital"></i> 宠物主人管理</h2>
            <a href="/owners/add" class="btn btn-success">+ 新增主人</a>
        </div>
        <!-- 数据表格 -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>编号</th>
                            <th>姓名</th>
                            <th>电话</th>
                            <th>地址</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 这里是循环显示数据的地方 -->
                        {% for owner in owners %}
                        <tr>
                            <td>{{ owner.id }}</td>
                            <td>{{ owner.name }}</td>
                            <td>{{ owner.phone }}</td>
                            <td>{{ owner.address }}</td>
                            <td>
                                <a href="/owners/edit/{{ owner.id }}" class="btn btn-sm btn-primary">编辑</a>
                                <a href="/owners/delete/{{ owner.id }}" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除这位主人吗？');">删除</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
