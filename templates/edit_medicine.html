<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>缂栬緫鑽搧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel='stylesheet' href='{{ url_for(''static'', filename=''style.css'') }}'>

</head>
<body>
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0">缂栬緫鑽搧</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">鑽搧鍚?/label>
                        <input type="text" name="medicine_name" class="form-control" value="{{ medicine.medicine_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">绫诲埆</label>
                        <input type="text" name="category" class="form-control" value="{{ medicine.category }}">
                    </div>
                    <div class="row">
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">搴撳瓨鏁伴噺</label>
                                <input type="number" name="stock_quantity" class="form-control" value="{{ medicine.stock_quantity }}">
                            </div>
                        </div>
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">鍗曚环</label>
                                <input type="number" name="price" class="form-control" step="0.01" value="{{ medicine.price }}">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">鏈夋晥鏈?/label>
                        <div class="d-flex align-items-center gap-1">
                            <select name="year" class="form-select" style="width:auto;" required>
                                {% for y in range(2020, 2036) %}
                                <option value="{{ y }}" {% if y == medicine.expiry_date.year %}selected{% endif %}>{{ y }}</option>
                                {% endfor %}
                            </select>
                            <span>骞?/span>
                            <select name="month" class="form-select" style="width:auto;" required>
                                {% for m in range(1, 13) %}
                                <option value="{{ '%02d' % m }}" {% if '%02d' % m == medicine.expiry_date.strftime('%m') %}selected{% endif %}>{{ '%02d' % m }}</option>
                                {% endfor %}
                            </select>
                            <span>鏈?/span>
                            <select name="day" class="form-select" style="width:auto;" required>
                                {% for d in range(1, 32) %}
                                <option value="{{ '%02d' % d }}" {% if '%02d' % d == medicine.expiry_date.strftime('%d') %}selected{% endif %}>{{ '%02d' % d }}</option>
                                {% endfor %}
                            </select>
                            <span>鏃?/span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">鏇存柊</button>
                    <a href="/medicines" class="btn btn-secondary w-100 mt-2">鍙栨秷</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
