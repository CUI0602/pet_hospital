<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>新增主人</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% include '_navbar.html' %}
    <div class="container-tech" style="max-width: 600px; padding-top: 1.5rem;">
        <div class="glass-card">
            <div class="card-header"><h5>新增宠物主人</h5></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">姓名</label>
                        <input type="text" name="name" class="form-control form-tech" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">电话</label>
                        <input type="text" name="phone" class="form-control form-tech" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">地址</label>
                        <input type="text" name="address" class="form-control form-tech">
                    </div>
                    <button type="submit" class="btn-glass w-100">保存</button>
                    <a href="/owners" class="btn btn-glass-outline w-100 mt-2" style="text-align: center; display: block;">取消</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
