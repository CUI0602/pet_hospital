<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>编辑兽医</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0">编辑兽医</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">姓名</label>
                        <input type="text" name="name" class="form-control" value="{{ veterinarian.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">职称</label>
                        <input type="text" name="title" class="form-control" value="{{ veterinarian.title }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">电话</label>
                        <input type="text" name="phone" class="form-control" value="{{ veterinarian.phone }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">专长</label>
                        <input type="text" name="specialty" class="form-control" value="{{ veterinarian.specialty }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">年龄</label>
                        <input type="number" name="age" class="form-control" value="{{ veterinarian.age }}">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">更新</button>
                    <a href="/veterinarians" class="btn btn-secondary w-100 mt-2">取消</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
