<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>兽医管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary"><i class="bi bi-hospital"></i> 兽医管理</h2>
            <a href="/veterinarians/add" class="btn btn-success">+ 新增兽医</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>编号</th>
                            <th>姓名</th>
                            <th>职称</th>
                            <th>电话</th>
                            <th>专长</th>
                            <th>年龄</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for veterinarian in veterinarians %}
                        <tr>
                            <td>{{ veterinarian.id }}</td>
                            <td>{{ veterinarian.name }}</td>
                            <td>{{ veterinarian.title }}</td>
                            <td>{{ veterinarian.phone }}</td>
                            <td>{{ veterinarian.specialty }}</td>
                            <td>{{ veterinarian.age }}</td>
                            <td>
                                <a href="/veterinarians/edit/{{ veterinarian.id }}" class="btn btn-sm btn-primary">编辑</a>
                                <a href="/veterinarians/delete/{{ veterinarian.id }}" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除这位兽医吗？');">删除</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
