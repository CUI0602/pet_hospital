<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>新增预约</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% include '_navbar.html' %}
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">新增预约</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">宠物</label>
                        <select name="pet_id" class="form-select" required>
                            <option value="">请选择宠物</option>
                            {% for pet in pets %}
                            <option value="{{ pet.id }}">{{ pet.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">兽医</label>
                        <select name="vet_id" class="form-select" required>
                            <option value="">请选择兽医</option>
                            {% for vet in veterinarians %}
                            <option value="{{ vet.id }}">{{ vet.name }} - {{ vet.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">服务类型</label>
                        <select name="service_type" class="form-select">
                            <option value="">请选择</option>
                            <option value="疫苗接种">疫苗接种</option>
                            <option value="体检">体检</option>
                            <option value="内科检查">内科检查</option>
                            <option value="外科手术">外科手术</option>
                            <option value="美容洗澡">美容洗澡</option>
                            <option value="寄养">寄养</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">预约时间</label>
                        <div class="d-flex align-items-center gap-1">
                            <select name="year" class="form-select" style="width:auto;" required>
                                <option value="">年</option>
                                {% for y in range(2020, 2031) %}
                                <option value="{{ y }}">{{ y }}</option>
                                {% endfor %}
                            </select>
                            <span>年</span>
                            <select name="month" class="form-select" style="width:auto;" required>
                                <option value="">月</option>
                                {% for m in range(1, 13) %}
                                <option value="{{ '%02d' % m }}">{{ '%02d' % m }}</option>
                                {% endfor %}
                            </select>
                            <span>月</span>
                            <select name="day" class="form-select" style="width:auto;" required>
                                <option value="">日</option>
                                {% for d in range(1, 32) %}
                                <option value="{{ '%02d' % d }}">{{ '%02d' % d }}</option>
                                {% endfor %}
                            </select>
                            <span>日</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">就诊原因</label>
                        <textarea name="reason" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select name="status" class="form-select">
                            <option value="pending">待就诊</option>
                            <option value="completed">已完成</option>
                            <option value="cancelled">已取消</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">保存</button>
                    <a href="/appointments" class="btn btn-secondary w-100 mt-2">取消</a>
                </form>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
